services:
    database:
      container_name: database
      build:
        context: ./Database
        dockerfile: Dockerfile
      restart: on-failure:3
      env_file: .env
      ports:
        - "3306:3306"
      volumes:
        - db_data:/var/lib/mysql
      healthcheck:
        test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
        interval: 10s
        timeout: 5s
        retries: 3
        start_period: 30s

    etl:
      container_name: ETL
      build:
        context: ./ETL
        dockerfile: Dockerfile
      env_file: .env
      volumes:
        - ./Database/init.sql:/app/init.sql
        - ./Database/procedures.sql:/app/procedures.sql
      depends_on:
        database:
          condition: service_healthy
          restart: true

volumes:
  db_data: